# RAT Agent — CI/CD Pipeline
# Professional-grade CI with caching, linting, security audit, and full workspace build

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  # ── Build & Test (all platforms) ─────────────────────────────────────────
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build workspace
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace -- --nocapture

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --workspace --all-targets

      - name: Check documentation
        run: cargo doc --workspace --no-deps 2>&1 | tail -10

  # ── Security Audit ───────────────────────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Dependency audit
        run: cargo install cargo-audit && cargo audit 2>&1 | tail -20

  # ── Integration Tests (release mode) ────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Verify pipeline help
        run: timeout 5 ./target/release/rat-pipeline --help 2>&1 || true
